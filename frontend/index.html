<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricky and Morty Explorer</title>
</head>
<body>
    <header>
        <div>
            <h1>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                </h1>
            <p>EXPLORA LOS PERSONAJES DE RICK AND MORTY DEL MULTIVERSO</p>
         </div>    
    </header>
</body>

<main>
    <section class="filters-section" aria-label="filtro de busqueda">
        <div class="filters-inner">
            <div class="filter-group">
                <label for="search-name" class="filter-label">Nombre</label>
                <input type="text" id="search-name" class="filter-input" placeholder="ej:Rick, Morty, Beth..." autocomplete="off"/>
            </div>
            <div class="filter-group">
                <label for="filter-status" class="filter-label">Estado</label>
                <select id="filter-status" class="filter-select">
                    <option value="">todos</option>
                    <option value="alive">vivo</option>
                    <option value="dead">muerto</option>
                    <option value="unknown">desconocido</option>
                </select>
            </div>
            <div class="filter-group">
            <label for="filter-species" class="filter-label">especies</label>
                <select id="filter-species" class="filter-select">
                    <option value="">Todas</option>
                    <option value="human">Humano</option>
                    <option value="alien">Alienigena</option>
                    <option value="robot">Robot</option>
                    <option value="animal">Animal</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="filter-gender" class="filter-label">Genero</label>
                <select id="filter-gender" class="filter-select">
                    <option value="">todos</option>
                    <option value="male">masculino</option>
                    <option value="female">femenino</option>
                    <option value="genderless">sin genero</option>
                    <option value="unknown">desconocido</option>
                </select>
            </div>
            <!-- boton para buscar -->
            <button id="btn-search" class="btn btn-primary" type="button">Buscar</button>  
            <!-- boton para limpiar filtros --> 
            <button id="btn-clear" class="btn btn-secondary" type="button">Limpiar filtro</button>
        </div>
    
    </section>
    <section class="characters-section" aria-label="listado de personajes"></section>

    <!-- mensaje de estado y controla la visibilidad de este bloque-->
    <div id="status-message" class="status-message" role="status" aria-live="polite" hidden>
        <span id="status-text"></span>
    </div>

    <!--card de personajes y inyectamos desde la ui.js los <article>-->
    <div id="characters-grid" class="characters-grid" role="list"></div>

    <!-- paginacion de cards anterior y siguientes-->
     <section class="pagination-section" aria-label="Paginación">
      <div class="pagination-inner">
 
        <!-- Botón página anterior -->
        <button id="btn-prev" class="btn btn-page" type="button" aria-label="Página anterior" disabled>
          &#8592; Anterior
        </button>
 
        <span id="page-indicator" class="page-indicator" aria-live="polite">
          Página <strong id="current-page">1</strong> de <strong id="total-pages">1</strong>
        </span>
 
        <!-- Botón página siguiente -->
        <button id="btn-next" class="btn btn-page" type="button" aria-label="Página siguiente">
          Siguiente &#8594;
        </button>
 
      </div>
    </section>

    
</main>

</html>
